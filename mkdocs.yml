site_name: Pre-Calculus
repo_url: https://github.com/dmccreary/pre-calc
site_url: https://dmccreary.github.io/pre-calc/
site_description: An interactive intelligent textbook for pre-calculus designed to prepare students for AP pre-calculus tests.
site_author: Dan McCreary

nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Chapters:
    - List of Chapters: chapters/index.md
    - 1-Mathematical Foundations: chapters/01-mathematical-foundations/index.md
    - 2-Functions and Properties: chapters/02-functions-and-their-properties/index.md
    - 3-Rates of Change: chapters/03-rates-of-change/index.md
    - 4-Linear Functions: chapters/04-linear-functions/index.md
    - 5-Quadratics and Complex: chapters/05-quadratic-functions-and-complex-numbers/index.md
    - 6-Polynomial Fundamentals: chapters/06-polynomial-fundamentals/index.md
    - 7-Polynomial Zeros/Graphs: chapters/07-polynomial-zeros-and-graphs/index.md
    - 8-Rational Functions: chapters/08-rational-functions/index.md
    - 9-Function Transformations: chapters/09-function-transformations/index.md
    - 10-Data Modeling: chapters/10-data-modeling-and-regression/index.md
    - 11-Composition and Inverses: chapters/11-composition-and-inverse-functions/index.md
    - 12-Sequences: chapters/12-sequences/index.md
    - 13-Exponential Functions: chapters/13-exponential-functions/index.md
    - 14-Logarithmic Functions: chapters/14-logarithmic-functions/index.md
    - 15-Angles and Unit Circle: chapters/15-angles-and-the-unit-circle/index.md
    - 16-Trigonometric Functions: chapters/16-trigonometric-functions/index.md
    - 17-Trigonometric Graphs: chapters/17-trigonometric-graphs/index.md
    - 18-Sinusoidal Modeling: chapters/18-sinusoidal-modeling/index.md
    - 19-Trigonometric Identities: chapters/19-trigonometric-identities/index.md
    - 20-Inverse Trig/Equations: chapters/20-inverse-trig-functions-and-equations/index.md
    - 21-Polar and Parametric: chapters/21-polar-and-parametric-functions/index.md
    - 22-Vectors: chapters/22-vectors/index.md
    - 23-Matrices and Exam Prep: chapters/23-matrices-and-exam-preparation/index.md

  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept List: learning-graph/concept-list.md
    - Quality Metrics: learning-graph/quality-metrics.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
    - Mascot Test: learning-graph/mascot-test.md

  - Prompts:
    - Introduction: prompts/index.md
    - Seed Prompt: prompts/01-seed-prompt.md
    - Learning Graph: prompts/02-learning-graph.md

  - MicroSims:
    - Graph Viewer: sims/graph-viewer/index.md

  - Glossary: glossary.md
  - License: license.md
  - Contact: contact.md

theme:
  name: material
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  palette:
    primary: 'blue'
    accent: 'white'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - social_override

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Pre-Calculus
  textbook_version: "1.0"
  analytics:
    provider: google
    property: G-7JV5NK9Y25
