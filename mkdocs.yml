site_name: Pre-Calculus
repo_url: https://github.com/dmccreary/pre-calc
site_url: https://dmccreary.github.io/pre-calc/
site_description: An interactive intelligent textbook for pre-calculus designed to prepare students for AP pre-calculus tests.
site_author: Dan McCreary

nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept List: learning-graph/concept-list.md
    - Quality Metrics: learning-graph/quality-metrics.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Taxonomy Distribution: learning-graph/taxonomy-distribution.md

  - Prompts:
    - Introduction: prompts/index.md
    - Seed Prompt: prompts/01-seed-prompt.md
    - Learning Graph: prompts/02-learning-graph.md

  - MicroSims:
    - Graph Viewer: sims/graph-viewer/index.md

  - License: license.md
  - Contact: contact.md

theme:
  name: material
  logo: img/logo-192.png
  favicon: img/favicon.ico
  palette:
    primary: 'blue'
    accent: 'white'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - social_override

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css

extra_javascript:
  - js/extra.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Pre-Calculus
  textbook_version: "1.0"
  analytics:
    provider: google
    property: G-7JV5NK9Y25
